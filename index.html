<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Tab Test</title>
<style>
.tab{display:inline-block;padding:8px 16px;cursor:pointer;background:#eee;margin:4px}
.tab.active{background:#333;color:white}
.panel{display:none;padding:20px;border:1px solid #ccc;margin-top:10px}
.panel.active{display:block}
</style>
</head>
<body>
<div class="tab active" onclick="showTab('a')">Tab A</div>
<div class="tab" onclick="showTab('b')">Tab B</div>
<div class="tab" onclick="showTab('c')">Tab C</div>
<div id="tab-a" class="panel active">Panel A — tabs are working!</div>
<div id="tab-b" class="panel">Panel B</div>
<div id="tab-c" class="panel">Panel C</div>
<script>
function showTab(name) {
  var tabs = ['a','b','c'];
  document.querySelectorAll('.tab').forEach(function(t,i){
    t.classList.toggle('active', tabs[i]===name);
  });
  document.querySelectorAll('.panel').forEach(function(p){
    p.classList.remove('active');
  });
  document.getElementById('tab-'+name).classList.add('active');
}
</script>
</body>
</html>
